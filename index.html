<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9b59b6">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Note-AJSR">
    <link rel="apple-touch-icon" href="icono-192.png">
<link rel="stylesheet" href="style.css">
<title>Note-AJSR</title>
</head>
<body>
  <h1>¿Cómo te sientes hoy Anahi?</h1>
  <div class="emojis">
    <button onclick="irAMensaje('feliz')">😄</button>
    <button onclick="irAMensaje('triste')">😔</button>
    <button onclick="irAMensaje('enojada')">😡</button>
    <button onclick="irAMensaje('cansada')">😴</button>
    <button onclick="irAMensaje('abrumada')">😵‍💫</button>
  </div>

  <script>
    function irAMensaje(estado) {
      // Redirige a mensajes.html pasando la emoción
      window.location.href = `mensajes.html?estado=${estado}`;
    }
    
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Note-AJSR registrada con éxito'))
                    .catch(err => console.log('Error al registrar PWA', err));
            });
        }
  </script>
</body>
</html>
