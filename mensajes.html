<title>Mensaje</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0 10px;
  transition: background 0.3s ease;
}

/* CONTENEDOR */
.mensaje-container {
  display: flex;
  justify-content: center;
  margin-top: 100px;
  width: 100%;
}

/* POST-IT */
.mensaje {
  position: relative;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  max-width: 90%;
  min-height: 120px;
  font-size: 1.2rem;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  animation: aparecer 0.5s ease forwards;
  margin: 0 auto;
}

@keyframes aparecer {

  0% {
    transform: translateY(-200px) rotate(-10deg) scale(0.8);
    opacity: 0;
  }

  70% {
    transform: translateY(10px) rotate(-3deg) scale(1.05);
    opacity: 1;
  }

  100% {
    transform: translateY(0px) rotate(-2deg) scale(1);
    opacity: 1;
  }

}

#textoMensaje {
  margin: 0;
}

/* FIRMA */
.firma {
  margin-top: 15px;
  font-size: 0.9rem;
  opacity: 0.7;
}

/* REACCIÓN */
.reaccion {
  position: absolute;
  bottom: -10px;
  right: -10px;
  background: white;
  border-radius: 50%;
  padding: 5px 8px;
  font-size: 1.2rem;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* BOTONES */
.reacciones {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.reacciones button {
  font-size: 1.5rem;
  margin: 5px;
  cursor: pointer;
  background: none;
  border: none;
}

/* MENÚ EMOJIS */
.emoji-menu {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  display: none;
}

.emoji-menu span {
  font-size: 1.8rem;
  margin: 5px;
  cursor: pointer;
}

/* MEDIA QUERY MOVIL PEQUEÑO */
@media screen and (max-width: 350px) {
  .mensaje {
    font-size: 1rem;
    padding: 20px;
  }
  .reacciones button {
    font-size: 1.3rem;
    margin: 3px;
  }
}
</style>

  let inicioLectura = Date.now();

  async function guardarTiempoLectura(estado, mensaje) {

  const segundos = Math.floor((Date.now() - inicioLectura) / 1000);

  const { data, error } = await db.from("aperturas").insert({
    estado: estado,
    mensaje: mensaje,
    segundos_visto: segundos,
    fecha: new Date().toISOString()
  });

  if (error) {
    console.log("Error guardando tiempo:", error);
  }
}

document.addEventListener("visibilitychange", () => {

  if (document.visibilityState === "hidden") {

    const mensaje = document.getElementById("textoMensaje").textContent;

    if (mensaje && estado) {

  triste: "#e3f2fd",
  enojada: "#ffebee",
  cansada: "#f3e5f5",
  abrumada: "#e0f2f1"
};

// ESTILO
function aplicarEstilo(estado) {
  if (!estado || !colores[estado]) return;

  mensajeBox.style.backgroundColor = colores[estado];
  document.body.style.backgroundColor = fondo[estado];
}

let estadoHoy = localStorage.getItem("estadoHoy");
let mensajeHoy = localStorage.getItem("mensajeHoy");
let usados = JSON.parse(localStorage.getItem("mensajesUsados")) || [];

// LÓGICA
if (ultimoDia === hoy && estadoHoy && mensajeHoy) {

  if (estado === estadoHoy) {
    mensajeTexto.textContent = mensajeHoy;
    aplicarEstilo(estado);

    guardarApertura(estado, mensajeHoy);

  } else {
   mensajeTexto.textContent = "Ese no era tu mood de hoy 👀 vuelve mañana ✨";

mensajeBox.style.backgroundColor = "#f0f0f0";
document.body.style.backgroundColor = "#f0f0f0";

// ocultar firma
document.getElementById("firma").style.display = "none";

// ocultar reacciones
document.querySelector(".reacciones").style.display = "none";

// limpiar reacción
document.getElementById("reaccion").textContent = "";


  // ocultar reacción
  document.getElementById("reaccion").textContent = "";
  document.querySelector(".reacciones").style.display = "none";
}

} else {

  if (!mensajes[estado]) {
    mensajeTexto.textContent = "Error: estado no válido";
  } else {

    if (usados.length >= mensajes[estado].length) {
      usados = [];
    }

    let disponibles = mensajes[estado].filter(m => !usados.includes(m));
    let nuevoMensaje = disponibles[Math.floor(Math.random() * disponibles.length)];

    usados.push(nuevoMensaje);

    localStorage.setItem("mensajesUsados", JSON.stringify(usados));
    localStorage.setItem("mensajeHoy", nuevoMensaje);
    localStorage.setItem("estadoHoy", estado);
    localStorage.setItem("ultimoDia", hoy);

    mensajeTexto.textContent = nuevoMensaje;
    aplicarEstilo(estado);

    guardarApertura(estado, nuevoMensaje);
  }
}


// TOGGLE MENU
function toggleMenu() {
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// CARGAR REACCIÓN

  const estadoGuardado = localStorage.getItem("estadoHoy");

  if (reaccionGuardada && estado === estadoGuardado) {
    document.getElementById("reaccion").textContent = reaccionGuardada;
  }
};
